<body>
    <div class="app-container">
        <header>
            <h1>IndenniTool 💼</h1>
            <p style="text-align: center; color: #666; margin-bottom: 20px; margin-top: -10px;">Calcolo Preavviso e Indennità CCNL Credito</p>
        </header>

        <main id="input-screen">
            <div class="form-group">
                <label for="categoria">Categoria Contrattuale</label>
                <select id="categoria">
                    <option value="unificata">Area Unificata (ex 1ª e 2ª)</option>
                    <option value="terza">3ª Area Professionale</option>
                    <option value="quadri">Quadri Direttivi</option>
                    <option value="dirigenti">Dirigenti</option>
                </select>
            </div>

            <div class="form-group">
                <label for="motivo">Motivo Risoluzione / Evento</label>
                <select id="motivo"></select>
            </div>

            <div class="form-group">
                <label for="ral">Retribuzione Annua Lorda (RAL in €)</label>
                <input type="text" id="ral" placeholder="es. 35.000,00" inputmode="decimal">
                <small style="color: #666;">Puoi usare il "." per le migliaia e la "," per i decimali (Calcolo su RAL / 12)</small>
            </div>

            <div class="form-group">
                <label for="anzianita">Anzianità di servizio complessiva (anni)</label>
                <input type="number" id="anzianita" min="0" step="1" value="5">
            </div>

            <div class="form-group" id="group-eta" style="display: none;">
                <label for="eta">Età anagrafica (anni compiuti)</label>
                <input type="number" id="eta" min="0" step="1" value="50">
            </div>

            <div class="form-group" id="group-previdenza">
                <label for="previdenza">Trattamento di Previdenza Aziendale Migliorativo</label>
                <select id="previdenza">
                    <option value="assente">Assente</option>
                    <option value="massima">Presente (Misura Massima)</option>
                    <option value="inferiore" id="opt-inferiore">Presente (Misura Inferiore alla Massima)</option>
                </select>
            </div>

            <button class="btn-primary" onclick="calcola()">Calcola Risultati</button>
        </main>

        <main id="result-screen" style="display: none;">
            <div class="result-card" id="result-content">
                </div>
            
            <div class="button-group">
                <button class="btn-secondary" onclick="resetForm()">Indietro</button>
                <button class="btn-primary" onclick="esportaPDF()">Esporta PDF</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
